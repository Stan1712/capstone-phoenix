apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: taskapp

spec:
  replicas: 2

  strategy:
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: backend

  template:

    metadata:
      labels:
        app: backend

    spec:

      topologySpreadConstraints:

      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule

        labelSelector:
          matchLabels:
            app: backend

      containers:

      - name: backend

        image: ghcr.io/ts-a-devops/taskapp-backend:YOUR_IMAGE_TAG

        ports:
        - containerPort: 5000

        envFrom:
        - configMapRef:
            name: taskapp-config

        - secretRef:
            name: taskapp-secret

        resources:

          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"

        startupProbe:

          httpGet:
            path: /api/health
            port: 5000

          failureThreshold: 30

          periodSeconds: 5

        readinessProbe:

          httpGet:
            path: /api/health
            port: 5000

          initialDelaySeconds: 5

          periodSeconds: 10

        livenessProbe:

          httpGet:
            path: /api/health
            port: 5000

          initialDelaySeconds: 20

          periodSeconds: 20