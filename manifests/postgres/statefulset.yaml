apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: taskapp
spec:
  serviceName: postgres

  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:

      - name: postgres

        image: postgres:16

        env:

        - name: POSTGRES_DB
          value: taskapp

        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: taskapp-secret
              key: DATABASE_USER

        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: taskapp-secret
              key: DATABASE_PASSWORD

        ports:

        - containerPort: 5432

        volumeMounts:

        - mountPath: /var/lib/postgresql/data
          name: postgres-storage

  volumeClaimTemplates:

  - metadata:
      name: postgres-storage

    spec:
      accessModes:
      - ReadWriteOnce

      resources:
        requests:
          storage: 5Gi